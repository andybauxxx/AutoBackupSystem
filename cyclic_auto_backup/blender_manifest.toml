schema_version = "1.0.0"

id = "cyclic_auto_backup"
version = "1.4.6"
name = "AutoBackupSystem"
tagline = "Create a rotating backup after a set number of meaningful edits"
maintainer = "Andy Bau"
type = "add-on"
tags = ["System"]

blender_version_min = "4.2.0"

license = [
  "SPDX:GPL-3.0-or-later",
]

[permissions]
files = "Save rotating blend-file backup copies to the selected folder"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  ".*",
  "*.zip",
]
